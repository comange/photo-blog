<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секрети шахових героїв - Три відтінки фіолетового</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Pangolin&family=Nunito:wght@400;700;800&family=Fredoka:wght@400;600;700&display=swap');
        
        :root {
            --purple-dark: #3b0764;    /* Найтемніший зверху */
            --purple-mid: #581c87;     /* Середній у центрі */
            --purple-light: #7e22ce;   /* Насичений світлий знизу */
            --accent-yellow: #facc15;
            --cloud-fill: #fefce8;
            --text-color: #1e1b4b;
            --font-main: 'Comfortaa', cursive; 
            --font-kids: 'Nunito', sans-serif; 
        }

        body {
            background: #e5e7eb;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Формат А4 */
        .book-canvas {
            width: 210mm;
            height: 297mm;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.4);
            transform: scale(0.65);
            transform-origin: center;
            /* Трирівневий градієнт фону */
            background: linear-gradient(
                to bottom, 
                var(--purple-dark) 0%, 
                var(--purple-dark) 30%, 
                var(--purple-mid) 30%, 
                var(--purple-mid) 65%, 
                var(--purple-light) 65%, 
                var(--purple-light) 100%
            );
        }

        /* Декоративні розділювачі хвиль між відтінками */
        .divider {
            position: absolute;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 2;
        }

        .divider-1 { top: 30%; transform: translateY(-50%); }
        .divider-2 { top: 65%; transform: translateY(-50%); }

        .main-content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0px 40px 40px 40px;
        }

        .logo-container {
            margin-top: 12px; 
            width: 20%;
            height: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .logo-diamond{
            flex: 1 0 auto;
            width: 20%;
            height:auto;
        }

        .label-badge {
            margin-top: 13px;
            background: var(--accent-yellow);
            color: var(--purple-dark);
            padding: 10px 30px;
            border-radius: 50px;
            font-family: var(--font-kids);
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #ca8a04;
        }

        .hero-title {
            margin-top: 30px;
            text-align: center;
        }

        .title-word-top {
            font-size: 115px;
            font-family: var(--font-kids);
            font-weight: 900;
            color: white;
            line-height: 0.8;
            text-shadow: 8px 8px 0px rgba(0,0,0,0.3);
        }
        
        .book-count{
            position: absolute;
            right: 70px;
            top: 100px;
            font-size: 24px;
            color: var(--accent-yellow);
            font-family: 'Pangolin', cursive;
        }

        .title-word-mid {
            font-size: 45px;
            color: var(--accent-yellow);
            font-family: 'Pangolin', cursive;
            margin: 15px 0;
            font-weight: bold;
        }

        .cloud-title {
            background: var(--cloud-fill);
            padding: 40px 70px;
            border-radius: 120px;
            border: 12px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-top: 5px;
        }

        .cloud-title h2 {
            font-size: 80px;
            font-family: var(--font-main);
            font-weight: 900;
            color: var(--text-color);
            line-height: 1.1;
        }

        .hero-graphics {
            margin-top: auto;
            margin-bottom: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            gap: -20px;
        }

        .svg-hero {
            width: 280px;
            filter: drop-shadow(0 25px 25px rgba(0,0,0,0.3));
        }

        .promo-star {
            position: absolute;
            right: 30px;
            bottom: 181px;
            background: #fb7185;
            color: white;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transform: rotate(-5deg);
            border: 6px solid white;
            font-family: var(--font-main);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 25;
        }

        .author-footer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 21px;
            font-weight: 700;
            color: white;
            font-family: var(--font-main);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            width: 100%;
            text-align: center;
        }

        /* SVG Хвилі для розділення кольорів */
        .wave-path { fill: var(--purple-mid); }
        .wave-path-2 { fill: var(--purple-light); }

        @media print {
            .book-canvas { transform: none; }
            body { background: white; }
        }
    </style>
</head>
